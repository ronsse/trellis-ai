<svg width="900" height="340" viewBox="0 0 900 340" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg2" x1="0" y1="0" x2="900" y2="340">
            <stop offset="0%" stop-color="#0f1117"/>
            <stop offset="100%" stop-color="#131620"/>
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-auto">
            <path d="M 0 0 L 10 3 L 0 6 z" fill="#6366f1"/>
        </marker>
        <marker id="arrowDim" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto-start-auto">
            <path d="M 0 0 L 10 3 L 0 6 z" fill="#3a3d5c"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect width="900" height="340" fill="url(#bg2)" rx="12"/>
    <pattern id="grid2" width="30" height="30" patternUnits="userSpaceOnUse">
        <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e2030" stroke-width="0.5"/>
    </pattern>
    <rect width="900" height="340" fill="url(#grid2)" rx="12" opacity="0.5"/>

    <!-- Title -->
    <text x="450" y="30" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#e1e4ed">How a Trace Flows Through Trellis</text>

    <!-- ============================================================ -->
    <!-- WRITE PATH (top) -->
    <!-- ============================================================ -->
    <text x="30" y="62" font-family="-apple-system, sans-serif" font-size="9" fill="#f59e0b" font-weight="600" letter-spacing="1.2">WRITE PATH</text>

    <!-- Agent -->
    <rect x="30" y="74" width="100" height="52" rx="6" fill="#1e1535" stroke="#4f46e5" stroke-opacity="0.4"/>
    <text x="80" y="96" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#a5b4fc">Agent</text>
    <text x="80" y="112" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#6366f1">does work</text>

    <!-- Arrow -->
    <line x1="130" y1="100" x2="155" y2="100" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Ingest -->
    <rect x="160" y="74" width="100" height="52" rx="6" fill="#1a1d27" stroke="#f59e0b" stroke-opacity="0.3"/>
    <text x="210" y="96" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#e1e4ed">Ingest</text>
    <text x="210" y="112" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#f59e0b">validate schema</text>

    <!-- Arrow -->
    <line x1="260" y1="100" x2="285" y2="100" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Policy Gate -->
    <rect x="290" y="74" width="100" height="52" rx="6" fill="#1a1d27" stroke="#ef4444" stroke-opacity="0.3"/>
    <text x="340" y="96" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#e1e4ed">Policy Gate</text>
    <text x="340" y="112" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#ef4444">check rules</text>

    <!-- Arrow -->
    <line x1="390" y1="100" x2="415" y2="100" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Classify -->
    <rect x="420" y="74" width="100" height="52" rx="6" fill="#1a1d27" stroke="#3b82f6" stroke-opacity="0.3"/>
    <text x="470" y="96" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#e1e4ed">Classify</text>
    <text x="470" y="112" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#3b82f6">tag 4 facets</text>

    <!-- Arrow -->
    <line x1="520" y1="100" x2="545" y2="100" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Execute -->
    <rect x="550" y="74" width="100" height="52" rx="6" fill="#1a1d27" stroke="#22c55e" stroke-opacity="0.3"/>
    <text x="600" y="96" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#e1e4ed">Execute</text>
    <text x="600" y="112" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#22c55e">persist to store</text>

    <!-- Arrow -->
    <line x1="650" y1="100" x2="675" y2="100" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Emit Event -->
    <rect x="680" y="74" width="100" height="52" rx="6" fill="#1a1d27" stroke="#a855f7" stroke-opacity="0.3"/>
    <text x="730" y="96" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#e1e4ed">Emit Event</text>
    <text x="730" y="112" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#a855f7">audit log</text>

    <!-- Arrow to stores -->
    <line x1="600" y1="126" x2="600" y2="174" stroke="#3a3d5c" stroke-width="1" marker-end="url(#arrowDim)"/>

    <!-- Stores -->
    <rect x="510" y="178" width="180" height="38" rx="6" fill="#1a1d27" stroke="#2a2d3a"/>
    <text x="600" y="202" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#e1e4ed">Traces + Graph + Documents + Events</text>

    <!-- Arrow from stores to retrieval -->
    <line x1="510" y1="197" x2="420" y2="197" stroke="#3a3d5c" stroke-width="1"/>
    <line x1="420" y1="197" x2="420" y2="260" stroke="#3a3d5c" stroke-width="1" marker-end="url(#arrowDim)"/>

    <!-- ============================================================ -->
    <!-- READ PATH (bottom) -->
    <!-- ============================================================ -->
    <text x="30" y="252" font-family="-apple-system, sans-serif" font-size="9" fill="#22c55e" font-weight="600" letter-spacing="1.2">READ PATH</text>

    <!-- New Task -->
    <rect x="30" y="264" width="100" height="52" rx="6" fill="#1e1535" stroke="#4f46e5" stroke-opacity="0.4"/>
    <text x="80" y="286" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#a5b4fc">New Task</text>
    <text x="80" y="302" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#6366f1">agent starts</text>

    <!-- Arrow -->
    <line x1="130" y1="290" x2="155" y2="290" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Search -->
    <rect x="160" y="264" width="120" height="52" rx="6" fill="#1a1d27" stroke="#22c55e" stroke-opacity="0.3"/>
    <text x="220" y="286" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#e1e4ed">Multi-Strategy</text>
    <text x="220" y="302" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#22c55e">keyword + semantic + graph</text>

    <!-- Arrow -->
    <line x1="280" y1="290" x2="305" y2="290" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Deduplicate + Rank -->
    <rect x="310" y="264" width="120" height="52" rx="6" fill="#1a1d27" stroke="#22c55e" stroke-opacity="0.3"/>
    <text x="370" y="286" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#e1e4ed">Rank + Dedup</text>
    <text x="370" y="302" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#22c55e">filter noise, score</text>

    <!-- Arrow -->
    <line x1="430" y1="290" x2="455" y2="290" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Budget -->
    <rect x="460" y="264" width="120" height="52" rx="6" fill="#1a1d27" stroke="#22c55e" stroke-opacity="0.3"/>
    <text x="520" y="286" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#e1e4ed">Token Budget</text>
    <text x="520" y="302" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#22c55e">max_items + max_tokens</text>

    <!-- Arrow -->
    <line x1="580" y1="290" x2="605" y2="290" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Context Pack -->
    <rect x="610" y="264" width="120" height="52" rx="6" fill="#1a1d27" stroke="#6366f1" stroke-opacity="0.5"/>
    <text x="670" y="286" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#818cf8">Context Pack</text>
    <text x="670" y="302" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#6366f1">curated knowledge</text>

    <!-- Arrow to agent -->
    <line x1="730" y1="290" x2="755" y2="290" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Agent uses it -->
    <rect x="760" y="264" width="110" height="52" rx="6" fill="#1e1535" stroke="#4f46e5" stroke-opacity="0.4"/>
    <text x="815" y="286" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#a5b4fc">Agent Works</text>
    <text x="815" y="302" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#6366f1">with context</text>

    <!-- Feedback loop arrow -->
    <path d="M 815 316 L 815 330 L 80 330 L 80 316" stroke="#4f46e5" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#arrowDim)"/>
    <text x="450" y="328" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#4f46e5">feedback loop: trace results feed back as new knowledge</text>
</svg>

name: OpenAPI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  openapi-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Regenerate docs/api/v1.yaml and fail on drift
        run: make openapi-check

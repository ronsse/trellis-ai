name: Live infrastructure tests

# Runs the suites that exercise a real Bolt/openCypher (Neo4j) + Postgres
# backend so connection-pool, Cypher / SCD-2, vector-index, cross-store
# wiring, and wipe-helper regressions surface in CI rather than at deploy
# time. Both backends run as ephemeral **service containers**, so the job
# is hermetic and depends on no external managed instance.
#
# Previously this job pointed at a managed Neo4j AuraDB Free instance + a
# Neon Postgres project via repo secrets. AuraDB Free auto-deletes idle
# instances, so the host silently stopped resolving and took the whole
# suite red (DNS ServiceUnavailable) with no code regression. Containers
# remove that dependency entirely.
#
# Coverage tradeoff: managed-cloud-only behaviour (AuraDB's async vector-
# index provisioning, TLS bolt+s routing, Neon connection limits) is not
# exercised here. The store fixtures already wait on db.awaitIndexes, so
# the core wiring is covered; cloud-specific quirks are validated at
# deploy time.
#
# Triggered on push to main and workflow_dispatch. No periodic schedule —
# the containers are recreated each run, so there is nothing to drift.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  live-infra:
    name: live-infra (containerized Neo4j + Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      # Neo4j 2025.12 (community) — the version the shape #2 vector store
      # documents for self-hosted use. Community runs the full graph + SCD-2
      # suite. The one Cypher SEARCH vector-search test self-skips here: that
      # clause is an AuraDB-grade feature absent from self-hosted Docker
      # (community AND enterprise raise 51N26), so the e2e fixture probes for
      # it and skips when unavailable. NEO4J_AUTH sets the initial password so
      # there's no forced first-login change. The credentials are a literal
      # throwaway pair: the container is reachable only on the runner's
      # loopback, so there is nothing to keep secret.
      neo4j:
        image: neo4j:2025.12
        env:
          NEO4J_AUTH: neo4j/trellistestpw
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p trellistestpw 'RETURN 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 30s

      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: trellis
          POSTGRES_PASSWORD: trellis
          POSTGRES_DB: trellis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trellis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Trellis with live-infra extras
        run: pip install -e ".[dev,cloud,neo4j]"

      - name: Run live + contract suites against the containers
        env:
          TRELLIS_TEST_NEO4J_URI: bolt://localhost:7687
          TRELLIS_TEST_NEO4J_USER: neo4j
          TRELLIS_TEST_NEO4J_PASSWORD: trellistestpw
          TRELLIS_TEST_NEO4J_DATABASE: neo4j
          TRELLIS_TEST_PG_DSN: postgresql://trellis:trellis@localhost:5432/trellis
          # Backend-marked tests are deselected by default (tests/conftest.py);
          # these toggles opt the gated suites in. The loop suites are marked
          # live + slow + neo4j + postgres, so ALL FOUR toggles are needed.
          TRELLIS_TEST_LIVE: "1"
          TRELLIS_TEST_SLOW: "1"
          TRELLIS_TEST_NEO: "1"
          TRELLIS_TEST_POSTGRES: "1"
        # The graph contract suites (tests/unit/stores/contracts/) run the
        # GraphStoreContractTests against every configured backend — that's
        # where cross-backend SCD-2 drift (e.g. issue #195 edge re-ingest)
        # surfaces. pgvector's contract needs its own toggle + extension and
        # stays deselected here.
        run: |
          pytest \
            tests/integration/test_neo4j_e2e.py \
            tests/integration/loops/ \
            tests/unit/stores/contracts/ \
            -v

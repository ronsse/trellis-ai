name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      # Keep in sync with the ruff pin in pyproject.toml [dev] and .pre-commit-config.yaml
      - run: pip install "ruff==0.15.16"
      - run: ruff check src/ tests/

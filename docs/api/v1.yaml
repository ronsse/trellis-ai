components:
  schemas:
    BatchCommandItem:
      additionalProperties: false
      description: A single command within a batch request.
      properties:
        args:
          additionalProperties: true
          title: Args
          type: object
        idempotency_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency Key
        metadata:
          additionalProperties: true
          title: Metadata
          type: object
        operation:
          title: Operation
          type: string
        target_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Id
        target_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Type
      required:
      - operation
      title: BatchCommandItem
      type: object
    BatchCommandRequest:
      additionalProperties: false
      description: Request to execute a batch of mutation commands.
      properties:
        commands:
          items:
            $ref: '#/components/schemas/BatchCommandItem'
          title: Commands
          type: array
        metadata:
          additionalProperties: true
          title: Metadata
          type: object
        requested_by:
          default: api
          title: Requested By
          type: string
        strategy:
          default: stop_on_error
          title: Strategy
          type: string
      required:
      - commands
      title: BatchCommandRequest
      type: object
    BatchCommandResponse:
      additionalProperties: false
      description: Response after executing a batch of mutation commands.
      properties:
        batch_id:
          title: Batch Id
          type: string
        duplicates:
          title: Duplicates
          type: integer
        executed:
          title: Executed
          type: integer
        failed:
          title: Failed
          type: integer
        rejected:
          title: Rejected
          type: integer
        results:
          items:
            $ref: '#/components/schemas/CommandResponse'
          title: Results
          type: array
        status:
          default: ok
          title: Status
          type: string
        strategy:
          title: Strategy
          type: string
        succeeded:
          title: Succeeded
          type: integer
        total:
          title: Total
          type: integer
      required:
      - batch_id
      - strategy
      - total
      - executed
      - succeeded
      - failed
      - rejected
      - duplicates
      - results
      title: BatchCommandResponse
      type: object
    BatchStrategy:
      description: 'How a mutation batch handles per-item failures.


        Wire-level duplicate of :class:`trellis.mutate.commands.BatchStrategy`.'
      enum:
      - sequential
      - stop_on_error
      - continue_on_error
      title: BatchStrategy
      type: string
    BulkAliasItem:
      additionalProperties: false
      description: A single alias in a bulk ingest request.
      properties:
        entity_id:
          title: Entity Id
          type: string
        is_primary:
          default: false
          title: Is Primary
          type: boolean
        match_confidence:
          default: 1.0
          title: Match Confidence
          type: number
        raw_id:
          title: Raw Id
          type: string
        raw_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Raw Name
        source_system:
          title: Source System
          type: string
      required:
      - entity_id
      - source_system
      - raw_id
      title: BulkAliasItem
      type: object
    BulkEdgeItem:
      additionalProperties: false
      description: 'A single edge in a bulk ingest request.


        Inherits base edge fields from ``LinkRequest`` and adds an optional

        per-item ``idempotency_key``. Overrides ``properties`` to default to

        an empty dict (``LinkRequest`` defaults to ``None``).'
      properties:
        edge_kind:
          default: entity_related_to
          title: Edge Kind
          type: string
        idempotency_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency Key
        properties:
          additionalProperties: true
          title: Properties
          type: object
        source_id:
          title: Source Id
          type: string
        target_id:
          title: Target Id
          type: string
      required:
      - source_id
      - target_id
      title: BulkEdgeItem
      type: object
    BulkEntityItem:
      additionalProperties: false
      description: 'A single entity in a bulk ingest request.


        Inherits base entity fields from ``EntityCreateRequest`` and adds

        ``node_role``, ``generation_spec`` (for curated nodes), and an

        optional per-item ``idempotency_key``.'
      properties:
        entity_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Entity Id
        entity_type:
          title: Entity Type
          type: string
        generation_spec:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Generation Spec
        idempotency_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency Key
        name:
          title: Name
          type: string
        node_role:
          $ref: '#/components/schemas/NodeRole'
          default: semantic
        properties:
          additionalProperties: true
          title: Properties
          type: object
      required:
      - entity_type
      - name
      title: BulkEntityItem
      type: object
    BulkGroupResult:
      additionalProperties: false
      description: Aggregated results for one group (entities, edges, or aliases).
      properties:
        duplicates:
          default: 0
          title: Duplicates
          type: integer
        failed:
          default: 0
          title: Failed
          type: integer
        rejected:
          default: 0
          title: Rejected
          type: integer
        results:
          items:
            $ref: '#/components/schemas/BulkItemResult'
          title: Results
          type: array
        skipped:
          default: 0
          title: Skipped
          type: integer
        succeeded:
          default: 0
          title: Succeeded
          type: integer
        total:
          default: 0
          title: Total
          type: integer
      title: BulkGroupResult
      type: object
    BulkIngestRequest:
      additionalProperties: false
      description: 'Bulk ingest request carrying entities, edges, and aliases.


        Processed in order: entities → edges → aliases (edges and aliases

        reference entities, so entities must land first). Default strategy is

        ``continue_on_error`` — the common backfill case where partial success

        is acceptable and the caller wants a full per-item report.'
      properties:
        aliases:
          items:
            $ref: '#/components/schemas/BulkAliasItem'
          title: Aliases
          type: array
        edges:
          items:
            $ref: '#/components/schemas/BulkEdgeItem'
          title: Edges
          type: array
        entities:
          items:
            $ref: '#/components/schemas/BulkEntityItem'
          title: Entities
          type: array
        requested_by:
          default: api
          title: Requested By
          type: string
        strategy:
          $ref: '#/components/schemas/BatchStrategy'
          default: continue_on_error
      title: BulkIngestRequest
      type: object
    BulkIngestResponse:
      additionalProperties: false
      description: Response for a bulk ingest request.
      properties:
        aliases:
          $ref: '#/components/schemas/BulkGroupResult'
        batch_id:
          title: Batch Id
          type: string
        edges:
          $ref: '#/components/schemas/BulkGroupResult'
        entities:
          $ref: '#/components/schemas/BulkGroupResult'
        status:
          default: ok
          title: Status
          type: string
        strategy:
          title: Strategy
          type: string
      required:
      - batch_id
      - strategy
      title: BulkIngestResponse
      type: object
    BulkItemResult:
      additionalProperties: false
      description: Per-item result within a bulk ingest group.
      properties:
        id:
          anyOf:
          - type: string
          - type: 'null'
          title: Id
        message:
          default: ''
          title: Message
          type: string
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        status:
          title: Status
          type: string
      required:
      - status
      title: BulkItemResult
      type: object
    CommandResponse:
      additionalProperties: false
      description: Response after executing a mutation command.
      properties:
        command_id:
          title: Command Id
          type: string
        created_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Created Id
        message:
          title: Message
          type: string
        operation:
          title: Operation
          type: string
        status:
          title: Status
          type: string
      required:
      - status
      - command_id
      - operation
      - message
      title: CommandResponse
      type: object
    CreatePolicyRequest:
      description: Typed request body for policy creation.
      properties:
        enforcement:
          $ref: '#/components/schemas/Enforcement'
          default: warn
        policy_type:
          $ref: '#/components/schemas/PolicyType'
        rules:
          items:
            $ref: '#/components/schemas/PolicyRule'
          title: Rules
          type: array
        scope:
          $ref: '#/components/schemas/PolicyScope'
      required:
      - policy_type
      - scope
      - rules
      title: CreatePolicyRequest
      type: object
    DeprecationNotice:
      additionalProperties: false
      description: 'One deprecated route surfaced by ``GET /api/version``.


        Mirrors :class:`trellis_api.deprecation.DeprecationEntry` but with

        ISO-string dates for wire-safe serialization.  Clients can log a

        warning or schedule a migration off the deprecated path before

        they actually call it.'
      properties:
        deprecated_since:
          title: Deprecated Since
          type: string
        path:
          title: Path
          type: string
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
        replacement:
          anyOf:
          - type: string
          - type: 'null'
          title: Replacement
        sunset_on:
          title: Sunset On
          type: string
      required:
      - path
      - deprecated_since
      - sunset_on
      title: DeprecationNotice
      type: object
    Enforcement:
      enum:
      - enforce
      - warn
      - audit_only
      title: Enforcement
      type: string
    EntityCreateRequest:
      additionalProperties: false
      description: Request to create an entity node.
      properties:
        entity_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Entity Id
        entity_type:
          title: Entity Type
          type: string
        name:
          title: Name
          type: string
        properties:
          additionalProperties: true
          title: Properties
          type: object
      required:
      - entity_type
      - name
      title: EntityCreateRequest
      type: object
    FeedbackRequest:
      additionalProperties: false
      description: Request to record feedback on a target.
      properties:
        comment:
          anyOf:
          - type: string
          - type: 'null'
          title: Comment
        pack_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Pack Id
        rating:
          title: Rating
          type: number
        target_id:
          title: Target Id
          type: string
      required:
      - target_id
      - rating
      title: FeedbackRequest
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HealthResponse:
      additionalProperties: false
      description: Health check response.
      properties:
        checks:
          additionalProperties:
            type: boolean
          title: Checks
          type: object
        status:
          default: ok
          title: Status
          type: string
      title: HealthResponse
      type: object
    IngestResponse:
      additionalProperties: false
      description: Response after ingesting a trace or evidence.
      properties:
        evidence_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Evidence Id
        status:
          default: ok
          title: Status
          type: string
        trace_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Trace Id
      title: IngestResponse
      type: object
    LinkRequest:
      additionalProperties: false
      description: Request to create a graph edge.
      properties:
        edge_kind:
          default: entity_related_to
          title: Edge Kind
          type: string
        properties:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Properties
        source_id:
          title: Source Id
          type: string
        target_id:
          title: Target Id
          type: string
      required:
      - source_id
      - target_id
      title: LinkRequest
      type: object
    NodeRole:
      description: 'Graph node role.


        Wire-level duplicate of :class:`trellis.schemas.enums.NodeRole`.'
      enum:
      - structural
      - semantic
      - curated
      title: NodeRole
      type: string
    PackRequest:
      additionalProperties: false
      description: Request to assemble a context pack.
      properties:
        agent_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Agent Id
        domain:
          anyOf:
          - type: string
          - type: 'null'
          title: Domain
        intent:
          title: Intent
          type: string
        max_items:
          default: 50
          title: Max Items
          type: integer
        max_tokens:
          default: 8000
          title: Max Tokens
          type: integer
        tag_filters:
          anyOf:
          - additionalProperties:
              items:
                type: string
              type: array
            type: object
          - type: 'null'
          title: Tag Filters
      required:
      - intent
      title: PackRequest
      type: object
    PackResponse:
      additionalProperties: false
      description: Response containing an assembled context pack.
      properties:
        agent_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Agent Id
        count:
          title: Count
          type: integer
        domain:
          anyOf:
          - type: string
          - type: 'null'
          title: Domain
        intent:
          title: Intent
          type: string
        items:
          items:
            additionalProperties: true
            type: object
          title: Items
          type: array
        pack_id:
          title: Pack Id
          type: string
        retrieval_report:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Retrieval Report
        status:
          default: ok
          title: Status
          type: string
      required:
      - pack_id
      - intent
      - count
      - items
      title: PackResponse
      type: object
    PolicyRule:
      additionalProperties: false
      description: A single rule within a policy.
      properties:
        action:
          default: allow
          enum:
          - allow
          - deny
          - require_approval
          - warn
          title: Action
          type: string
        condition:
          default: always
          title: Condition
          type: string
        operation:
          title: Operation
          type: string
        params:
          additionalProperties: true
          title: Params
          type: object
        schema_version:
          default: 0.1.0
          title: Schema Version
          type: string
      required:
      - operation
      title: PolicyRule
      type: object
    PolicyScope:
      additionalProperties: false
      description: Scope at which a policy applies.
      properties:
        level:
          enum:
          - global
          - domain
          - team
          - entity_type
          title: Level
          type: string
        schema_version:
          default: 0.1.0
          title: Schema Version
          type: string
        value:
          anyOf:
          - type: string
          - type: 'null'
          title: Value
      required:
      - level
      title: PolicyScope
      type: object
    PolicyType:
      enum:
      - mutation
      - access
      - retention
      - redaction
      title: PolicyType
      type: string
    PromoteRequest:
      additionalProperties: false
      description: Request to promote a trace to a precedent.
      properties:
        description:
          title: Description
          type: string
        requested_by:
          default: api
          title: Requested By
          type: string
        title:
          title: Title
          type: string
        trace_id:
          title: Trace Id
          type: string
      required:
      - trace_id
      - title
      - description
      title: PromoteRequest
      type: object
    SelfUpdateRequest:
      description: Request body for self-update.
      properties:
        ref:
          default: main
          description: Git ref to install (branch, tag, or commit)
          title: Ref
          type: string
        restart:
          default: true
          description: Restart the trellis-api systemd service after install
          title: Restart
          type: boolean
        restart_delay_secs:
          default: 2
          description: Seconds to wait before restart
          maximum: 30.0
          minimum: 1.0
          title: Restart Delay Secs
          type: integer
      title: SelfUpdateRequest
      type: object
    SelfUpdateResponse:
      description: Response from self-update.
      properties:
        pip_output:
          title: Pip Output
          type: string
        ref:
          title: Ref
          type: string
        restart_scheduled:
          title: Restart Scheduled
          type: boolean
        status:
          title: Status
          type: string
      required:
      - status
      - pip_output
      - ref
      - restart_scheduled
      title: SelfUpdateResponse
      type: object
    StatsResponse:
      additionalProperties: false
      description: Store statistics response.
      properties:
        documents:
          default: 0
          title: Documents
          type: integer
        edges:
          default: 0
          title: Edges
          type: integer
        events:
          default: 0
          title: Events
          type: integer
        nodes:
          default: 0
          title: Nodes
          type: integer
        status:
          default: ok
          title: Status
          type: string
        traces:
          default: 0
          title: Traces
          type: integer
      title: StatsResponse
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
    VersionResponse:
      additionalProperties: false
      description: 'Response body for ``GET /api/version``.


        Used by SDK clients on first call to enforce compatibility:


        * Reject when ``api_major`` differs from the client''s expected major.

        * Warn when ``api_minor`` is older than the client''s expected minor.

        * Reject when the client''s own version is below ``sdk_min``.


        ``package_version`` is informational only — it''s the actual

        installed ``trellis-ai`` package version, which may move without

        changing the API contract.'
      properties:
        api_major:
          title: Api Major
          type: integer
        api_minor:
          title: Api Minor
          type: integer
        api_version:
          title: Api Version
          type: string
        deprecations:
          items:
            $ref: '#/components/schemas/DeprecationNotice'
          title: Deprecations
          type: array
        package_version:
          title: Package Version
          type: string
        sdk_min:
          title: Sdk Min
          type: string
        wire_schema:
          title: Wire Schema
          type: string
      required:
      - api_major
      - api_minor
      - api_version
      - wire_schema
      - sdk_min
      - package_version
      title: VersionResponse
      type: object
info:
  description: Structured memory and learning for AI agents
  title: Trellis API
  version: 0.2.0
openapi: 3.1.0
paths:
  /api/v1/advisories:
    get:
      description: List stored advisories.
      operationId: list_advisories_api_v1_advisories_get
      parameters:
      - description: Filter by scope
        in: query
        name: scope
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by scope
          title: Scope
      - description: Minimum confidence
        in: query
        name: min_confidence
        required: false
        schema:
          default: 0.0
          description: Minimum confidence
          title: Min Confidence
          type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response List Advisories Api V1 Advisories Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Advisories
      tags:
      - admin
  /api/v1/advisories/generate:
    post:
      description: 'Generate advisories from outcome data.


        Analyzes PACK_ASSEMBLED and FEEDBACK_RECORDED events to find patterns,

        then stores deterministic advisories for delivery alongside packs.'
      operationId: generate_advisories_api_v1_advisories_generate_post
      parameters:
      - description: Days of history to analyze
        in: query
        name: days
        required: false
        schema:
          default: 30
          description: Days of history to analyze
          title: Days
          type: integer
      - description: Min sample size
        in: query
        name: min_sample
        required: false
        schema:
          default: 5
          description: Min sample size
          title: Min Sample
          type: integer
      - description: Min effect size
        in: query
        name: min_effect
        required: false
        schema:
          default: 0.15
          description: Min effect size
          title: Min Effect
          type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Generate Advisories Api V1 Advisories Generate Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Generate Advisories
      tags:
      - admin
  /api/v1/commands/batch:
    post:
      description: 'Execute a batch of mutation commands through the governed pipeline.


        Supported strategies:


        - ``sequential`` — execute all, never stop early.

        - ``stop_on_error`` — halt on the first ``FAILED`` or ``REJECTED``.

        - ``continue_on_error`` — execute all, include errors in results.'
      operationId: execute_batch_api_v1_commands_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchCommandRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchCommandResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Execute Batch
      tags:
      - mutations
  /api/v1/documents:
    post:
      description: 'Write a document to the document store for FTS retrieval.


        Accepts: ``{"doc_id": "...", "content": "...", "metadata": {...}}``'
      operationId: create_document_api_v1_documents_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              title: Body
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Create Document Api V1 Documents Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create Document
      tags:
      - curate
  /api/v1/effectiveness:
    get:
      description: Analyze context pack effectiveness.
      operationId: effectiveness_api_v1_effectiveness_get
      parameters:
      - description: Days of history to analyze
        in: query
        name: days
        required: false
        schema:
          default: 30
          description: Days of history to analyze
          title: Days
          type: integer
      - description: Minimum item appearances
        in: query
        name: min_appearances
        required: false
        schema:
          default: 2
          description: Minimum item appearances
          title: Min Appearances
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Effectiveness Api V1 Effectiveness Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Effectiveness
      tags:
      - admin
  /api/v1/effectiveness/apply-noise-tags:
    post:
      description: 'Analyze effectiveness AND apply noise tags to low-value items.


        Runs the full feedback loop: analyze → tag noise items with

        signal_quality="noise" so PackBuilder excludes them by default.'
      operationId: apply_noise_tags_api_v1_effectiveness_apply_noise_tags_post
      parameters:
      - description: Days of history to analyze
        in: query
        name: days
        required: false
        schema:
          default: 30
          description: Days of history to analyze
          title: Days
          type: integer
      - description: Minimum item appearances
        in: query
        name: min_appearances
        required: false
        schema:
          default: 2
          description: Minimum item appearances
          title: Min Appearances
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Apply Noise Tags Api V1 Effectiveness Apply Noise Tags Post
                type: object
          description: Successful Response
        '422':

  /api/v1/ingest/bulk:
    post:
      description: "Bulk ingest entities, edges, and aliases in one request.\n\nEntities and edges flow through the governed\
        \ mutation pipeline\n(audit events, per-item idempotency). Aliases route directly to the\ngraph store -- there is\
        \ no alias mutation operation yet; the graph\nstore handles alias versioning (SCD Type 2) natively.\n\nStrategies:\n\
        \n- ``continue_on_error`` *(default)* -- run every item, report per-item\n  status. Suited for backfill where partial\
        \ success is acceptable.\n- ``stop_on_error`` -- halt at the first FAILED/REJECTED result and\n  skip remaining items,\
        \ including later groups.\n- ``sequential`` -- behaves like ``continue_on_error`` (errors don't\n  halt); kept for\
        \ consistency with ``/commands/batch``.\n\nProcessing order is entities → edges → aliases (downstream groups\nreference\
        \ entities, so entities must land first)."
      operationId: ingest_bulk_api_v1_ingest_bulk_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkIngestRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkIngestResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Ingest Bulk
      tags:
      - ingest

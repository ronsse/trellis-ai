components:
  schemas:
    BatchCommandItem:
      additionalProperties: false
      description: A single command within a batch request.
      properties:
        args:
          additionalProperties: true
          title: Args
          type: object
        idempotency_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency Key
        metadata:
          additionalProperties: true
          title: Metadata
          type: object
        operation:
          title: Operation
          type: string
        target_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Id
        target_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Type
      required:
      - operation
      title: BatchCommandItem
      type: object
    BatchCommandRequest:
      additionalProperties: false
      description: Request to execute a batch of mutation commands.
      properties:
        commands:
          items:
            $ref: '#/components/schemas/BatchCommandItem'
          title: Commands
          type: array
        metadata:
          additionalProperties: true
          title: Metadata
          type: object
        requested_by:
          default: api:mutations
          title: Requested By
          type: string
        strategy:
          default: stop_on_error
          title: Strategy
          type: string
      required:
      - commands
      title: BatchCommandRequest
      type: object
    BatchCommandResponse:
      additionalProperties: false
      description: Response after executing a batch of mutation commands.
      properties:
        batch_id:
          title: Batch Id
          type: string
        duplicates:
          title: Duplicates
          type: integer
        executed:
          title: Executed
          type: integer
        failed:
          title: Failed
          type: integer
        rejected:
          title: Rejected
          type: integer
        results:
          items:
            $ref: '#/components/schemas/CommandResponse'
          title: Results
          type: array
        status:
          default: ok
          title: Status
          type: string
        strategy:
          title: Strategy
          type: string
        succeeded:
          title: Succeeded
          type: integer
        total:
          title: Total
          type: integer
      required:
      - batch_id
      - strategy
      - total
      - executed
      - succeeded
      - failed
      - rejected
      - duplicates
      - results
      title: BatchCommandResponse
      type: object
    BatchStrategy:
      description: 'How a mutation batch handles per-item failures.


        Wire-level duplicate of :class:`trellis.mutate.commands.BatchStrategy`.'
      enum:
      - sequential
      - stop_on_error
      - continue_on_error
      title: BatchStrategy
      type: string
    BulkAliasItem:
      additionalProperties: false
      description: A single alias in a bulk ingest request.
      properties:
        entity_id:
          title: Entity Id
          type: string
        is_primary:
          default: false
          title: Is Primary
          type: boolean
        match_confidence:
          default: 1.0
          title: Match Confidence
          type: number
        raw_id:
          title: Raw Id
          type: string
        raw_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Raw Name
        source_system:
          title: Source System
          type: string
      required:
      - entity_id
      - source_system
      - raw_id
      title: BulkAliasItem
      type: object
    BulkEdgeItem:
      additionalProperties: false
      description: 'A single edge in a bulk ingest request.


        Inherits base edge fields from ``LinkRequest`` and adds an optional

        per-item ``idempotency_key``. Overrides ``properties`` to default to

        an empty dict (``LinkRequest`` defaults to ``None``).'
      properties:
        edge_kind:
          default: entity_related_to
          title: Edge Kind
          type: string
        idempotency_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency Key
        properties:
          additionalProperties: true
          title: Properties
          type: object
        source_id:
          title: Source Id
          type: string
        target_id:
          title: Target Id
          type: string
      required:
      - source_id
      - target_id
      title: BulkEdgeItem
      type: object
    BulkEntityItem:
      additionalProperties: false
      description: 'A single entity in a bulk ingest request.


        Inherits base entity fields from ``EntityCreateRequest`` and adds

        ``node_role``, ``generation_spec`` (for curated nodes), and an

        optional per-item ``idempotency_key``.'
      properties:
        entity_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Entity Id
        entity_type:
          title: Entity Type
          type: string
        generation_spec:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Generation Spec
        idempotency_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency Key
        name:
          title: Name
          type: string
        node_role:
          $ref: '#/components/schemas/NodeRole'
          default: semantic
        properties:
          additionalProperties: true
          title: Properties
          type: object
      required:
      - entity_type
      - name
      title: BulkEntityItem
      type: object
    BulkGroupResult:
      additionalProperties: false
      description: Aggregated results for one group (entities, edges, or aliases).
      properties:
        duplicates:
          default: 0
          title: Duplicates
          type: integer
        failed:
          default: 0
          title: Failed
          type: integer
        rejected:
          default: 0
          title: Rejected
          type: integer
        results:
          items:
            $ref: '#/components/schemas/BulkItemResult'
          title: Results
          type: array
        skipped:
          default: 0
          title: Skipped
          type: integer
        succeeded:
          default: 0
          title: Succeeded
          type: integer
        total:
          default: 0
          title: Total
          type: integer
      title: BulkGroupResult
      type: object
    BulkIngestRequest:
      additionalProperties: false
      description: 'Bulk ingest request carrying entities, edges, and aliases.


        Processed in order: entities → edges → aliases (edges and aliases

        reference entities, so entities must land first). Default strategy is

        ``continue_on_error`` — the common backfill case where partial success

        is acceptable and the caller wants a full per-item report.'
      properties:
        aliases:
          items:
            $ref: '#/components/schemas/BulkAliasItem'
          title: Aliases
          type: array
        edges:
          items:
            $ref: '#/components/schemas/BulkEdgeItem'
          title: Edges
          type: array
        entities:
          items:
            $ref: '#/components/schemas/BulkEntityItem'
          title: Entities
          type: array
        requested_by:
          default: api:bulk-ingest
          title: Requested By
          type: string
        strategy:
          $ref: '#/components/schemas/BatchStrategy'
          default: continue_on_error
      title: BulkIngestRequest
      type: object
    BulkIngestResponse:
      additionalProperties: false
      description: Response for a bulk ingest request.
      properties:
        aliases:
          $ref: '#/components/schemas/BulkGroupResult'
        batch_id:
          title: Batch Id
          type: string
        edges:
          $ref: '#/components/schemas/BulkGroupResult'
        entities:
          $ref: '#/components/schemas/BulkGroupResult'
        status:
          default: ok
          title: Status
          type: string
        strategy:
          title: Strategy
          type: string
      required:
      - batch_id
      - strategy
      title: BulkIngestResponse
      type: object
    BulkItemResult:
      additionalProperties: false
      description: Per-item result within a bulk ingest group.
      properties:
        id:
          anyOf:
          - type: string
          - type: 'null'
          title: Id
        message:
          default: ''
          title: Message
          type: string
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        status:
          title: Status
          type: string
      required:
      - status
      title: BulkItemResult
      type: object
    CodeProposalListResponse:
      additionalProperties: false
      description: List of code-authoring proposals (read-only).
      properties:
        count:
          default: 0
          title: Count
          type: integer
        proposals:
          items:
            $ref: '#/components/schemas/CodeProposalSummary'
          title: Proposals
          type: array
      title: CodeProposalListResponse
      type: object
    CodeProposalSummary:
      additionalProperties: false
      description: One PROPOSAL_DRAFTED event as surfaced in the Review queue.
      properties:
        cluster_signature:
          default: ''
          title: Cluster Signature
          type: string
        generated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Generated At
        markdown_preview:
          default: ''
          title: Markdown Preview
          type: string
        proposal_id:
          title: Proposal Id
          type: string
        source_event_count:
          default: 0
          title: Source Event Count
          type: integer
        source_file:
          anyOf:
          - type: string
          - type: 'null'
          title: Source File
      required:
      - proposal_id
      title: CodeProposalSummary
      type: object
    CommandResponse:
      additionalProperties: false
      description: Response after executing a mutation command.
      properties:
        command_id:
          title: Command Id
          type: string
        created_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Created Id
        message:
          title: Message
          type: string
        operation:
          title: Operation
          type: string
        status:
          title: Status
          type: string
      required:
      - status
      - command_id
      - operation
      - message
      title: CommandResponse
      type: object
    CreatePolicyRequest:
      description: Typed request body for policy creation.
      properties:
        enforcement:
          $ref: '#/components/schemas/Enforcement'
          default: warn
        policy_type:
          $ref: '#/components/schemas/PolicyType'
        rules:
          items:
            $ref: '#/components/schemas/PolicyRule'
          title: Rules
          type: array
        scope:
          $ref: '#/components/schemas/PolicyScope'
      required:
      - policy_type
      - scope
      - rules
      title: CreatePolicyRequest
      type: object
    DraftAdrResponse:
      additionalProperties: false
      description: Rendered promotion-ADR markdown for a schema-evolution candidate.
      properties:
        candidate_id:
          title: Candidate Id
          type: string
        markdown:
          title: Markdown
          type: string
        suggested_canonical_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Suggested Canonical Name
      required:
      - candidate_id
      - markdown
      title: DraftAdrResponse
      type: object
    DraftSubmissionRequest:
      additionalProperties: false
      description: 'HTTP body wrapper for ``POST /api/v1/extract/drafts``.


        Carries the batch plus per-request knobs (strategy, override of

        ``requested_by``).  Most fields live on the batch itself; this

        wrapper only adds what''s request-scoped.'
      properties:
        batch:
          $ref: '#/components/schemas/ExtractionBatch'
        requested_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Requested By
        strategy:
          $ref: '#/components/schemas/BatchStrategy'
          default: continue_on_error
      required:
      - batch
      title: DraftSubmissionRequest
      type: object
    DraftSubmissionResult:
      additionalProperties: false
      description: 'Response for ``POST /api/v1/extract/drafts``.


        Mirrors the structure of

        :class:`trellis_wire.BatchCommandResponse` so callers can reuse

        existing batch-result handling, with the addition of batch-level

        metadata that identifies the submission end-to-end.'
      properties:
        batch_id:
          title: Batch Id
          type: string
        duplicates:
          default: 0
          title: Duplicates
          type: integer
        edges_submitted:
          default: 0
          title: Edges Submitted
          type: integer
        entities_submitted:
          default: 0
          title: Entities Submitted
          type: integer
        executed:
          default: 0
          title: Executed
          type: integer
        extractor:
          title: Extractor
          type: string
        failed:
          default: 0
          title: Failed
          type: integer
        idempotency_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency Key
        rejected:
          default: 0
          title: Rejected
          type: integer
        results:
          items:
            $ref: '#/components/schemas/CommandResponse'
          title: Results
          type: array
        status:
          default: ok
          title: Status
          type: string
        strategy:
          title: Strategy
          type: string
        succeeded:
          default: 0
          title: Succeeded
          type: integer
      required:
      - batch_id
      - extractor
      - strategy
      title: DraftSubmissionResult
      type: object
    EdgeDraft:
      additionalProperties: false
      description: 'An edge candidate submitted by a client extractor.


        ``source_id`` / ``target_id`` may reference either final entity

        IDs or draft-local IDs produced in the same batch — the server

        resolves draft-local references before issuing commands.'
      properties:
        confidence:
          default: 1.0
          maximum: 1.0
          minimum: 0.0
          title: Confidence
          type: number
        edge_kind:
          title: Edge Kind
          type: string
        properties:
          additionalProperties: true
          title: Properties
          type: object
        source_id:
          title: Source Id
          type: string
        target_id:
          title: Target Id
          type: string
      required:
      - source_id
      - target_id
      - edge_kind
      title: EdgeDraft
      type: object
    Enforcement:
      enum:
      - enforce
      - warn
      - audit_only
      title: Enforcement
      type: string
    EntityCreateRequest:
      additionalProperties: false
      description: Request to create an entity node.
      properties:
        entity_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Entity Id
        entity_type:
          title: Entity Type
          type: string
        name:
          title: Name
          type: string
        properties:
          additionalProperties: true
          title: Properties
          type: object
      required:
      - entity_type
      - name
      title: EntityCreateRequest
      type: object
    EntityDraft:
      additionalProperties: false
      description: 'An entity candidate submitted by a client extractor.


        Mirrors :class:`trellis.schemas.extraction.EntityDraft` but

        without the ``generation_spec`` field (curated-node provenance

        goes through ``/api/v1/entities`` with an explicit curation

        flow; extraction drafts are machine-generated).


        ``properties`` is an escape hatch for domain-specific fields

        (Unity Catalog column schemas, dbt config blocks, etc.) —

        validated opaquely at the wire level.  A future schema registry

        (deferred; see [TODO.md](../../TODO.md)) may add per-namespace

        typed validation; for now, clients own the shape.'
      properties:
        confidence:
          default: 1.0
          maximum: 1.0
          minimum: 0.0
          title: Confidence
          type: number
        entity_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Entity Id
        entity_type:
          title: Entity Type
          type: string
        name:
          title: Name
          type: string
        node_role:
          $ref: '#/components/schemas/NodeRole'
          default: semantic
        properties:
          additionalProperties: true
          title: Properties
          type: object
      required:
      - entity_type
      - name
      title: EntityDraft
      type: object
    ExtractionBatch:
      additionalProperties: false
      description: 'One unit of submission from a client extractor.


        ``idempotency_key`` is the primary deduplication signal — the

        server records it on the audit trail and a repeat submission

        with the same key is a no-op.  Typical pattern: combine the

        extractor name with a source snapshot identifier, e.g.

        ``"unity_catalog-sync-2026-04-17T14:22:00Z"``.


        ``extractor_name`` / ``extractor_version`` feed the audit

        trail''s ``requested_by`` field as ``f"{name}@{version}"`` so

        downstream effectiveness analysis can attribute drafts to a

        specific client release.'
      properties:
        edges:
          items:
            $ref: '#/components/schemas/EdgeDraft'
          title: Edges
          type: array
        entities:
          items:
            $ref: '#/components/schemas/EntityDraft'
          title: Entities
          type: array
        extractor_name:
          title: Extractor Name
          type: string
        extractor_version:
          title: Extractor Version
          type: string
        idempotency_key:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency Key
        source:
          title: Source
          type: string
        tier:
          $ref: '#/components/schemas/ExtractorTier'
          default: deterministic
      required:
      - source
      - extractor_name
      - extractor_version
      title: ExtractionBatch
      type: object
    ExtractorTier:
      description: 'Cost tier declared by an extractor when submitting drafts.


        Used for audit telemetry and effectiveness analysis.  The server

        trusts the client''s self-reported tier — it''s a honesty signal,

        not an enforcement mechanism.  Wire-level duplicate of

        :class:`trellis.extract.base.ExtractorTier`.'
      enum:
      - deterministic
      - hybrid
      - llm
      title: ExtractorTier
      type: string
    FeedbackRequest:
      additionalProperties: false
      description: Request to record feedback on a target.
      properties:
        comment:
          anyOf:
          - type: string
          - type: 'null'
          title: Comment
        pack_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Pack Id
        rating:
          title: Rating
          type: number
        target_id:
          title: Target Id
          type: string
      required:
      - target_id
      - rating
      title: FeedbackRequest
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HealthResponse:
      additionalProperties: false
      description: Health check response.
      properties:
        checks:
          additionalProperties:
            type: boolean
          title: Checks
          type: object
        status:
          default: ok
          title: Status
          type: string
      title: HealthResponse
      type: object
    IngestResponse:
      additionalProperties: false
      description: Response after ingesting a trace or evidence.
      properties:
        evidence_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Evidence Id
        status:
          default: ok
          title: Status
          type: string
        trace_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Trace Id
      title: IngestResponse
      type: object
    LearningCandidateListResponse:
      additionalProperties: false
      description: Most-recent learning-candidate artifact, or an empty hint.
      properties:
        candidate_count:
          default: 0
          title: Candidate Count
          type: integer
        candidates:
          items:
            additionalProperties: true
            type: object
          title: Candidates
          type: array
        generated_at_utc:
          anyOf:
          - type: string
          - type: 'null'
          title: Generated At Utc
        hint:
          anyOf:
          - type: string
          - type: 'null'
          title: Hint
        status:
          default: ok
          title: Status
          type: string
      title: LearningCandidateListResponse
      type: object
    LearningPromotionDecision:
      additionalProperties: false
      description: One per-candidate decision in a learning-promotion submission.
      properties:
        approved:
          default: false
          title: Approved
          type: boolean
        candidate_id:
          title: Candidate Id
          type: string
        promotion_name:
          default: ''
          title: Promotion Name
          type: string
        rationale:
          default: ''
          title: Rationale
          type: string
      required:
      - candidate_id
      title: LearningPromotionDecision
      type: object
    LearningPromotionRequest:
      additionalProperties: false
      description: 'Body for ``POST /api/v1/learning/promotions``.


        Carries per-candidate decisions. The server joins these against the

        most-recent candidate artifact, builds the entity/edge payloads via

        ``prepare_learning_promotions``, and submits each approved promotion

        through the governed :class:`MutationExecutor` pipeline.'
      properties:
        decisions:
          items:
            $ref: '#/components/schemas/LearningPromotionDecision'
          title: Decisions
          type: array
      title: LearningPromotionRequest
      type: object
    LearningPromotionResponse:
      additionalProperties: false
      description: Aggregate outcome of a learning-promotion submission.
      properties:
        approved_count:
          default: 0
          title: Approved Count
          type: integer
        promoted_count:
          default: 0
          title: Promoted Count
          type: integer
        ready_count:
          default: 0
          title: Ready Count
          type: integer
        results:
          items:
            $ref: '#/components/schemas/LearningPromotionResultRow'
          title: Results
          type: array
        status:
          default: ok
          title: Status
          type: string
      title: LearningPromotionResponse
      type: object
    LearningPromotionResultRow:
      additionalProperties: false
      description: Per-candidate outcome of a learning-promotion submission.
      properties:
        candidate_id:
          title: Candidate Id
          type: string
        entity_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Entity Id
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
        node_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Node Id
        status:
          title: Status
          type: string
      required:
      - candidate_id
      - status
      title: LearningPromotionResultRow
      type: object
    LinkRequest:
      additionalProperties: false
      description: Request to create a graph edge.
      properties:
        edge_kind:
          default: entity_related_to
          title: Edge Kind
          type: string
        properties:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Properties
        source_id:
          title: Source Id
          type: string
        target_id:
          title: Target Id
          type: string
      required:
      - source_id
      - target_id
      title: LinkRequest
      type: object
    MetricsTimeseriesResponse:
      additionalProperties: false
      description: 'Response for ``GET /api/v1/metrics/timeseries``.


        Echoes the request parameters (``metric`` / ``bucket`` / ``group_by``

        / ``days``) so the client can label the chart without re-deriving

        them, and carries one series per resolved group key. An empty store

        (or a metric with no events in the window) yields an empty

        ``series`` list.'
      properties:
        bucket:
          default: day
          title: Bucket
          type: string
        days:
          default: 30
          title: Days
          type: integer
        group_by:
          default: none
          title: Group By
          type: string
        metric:
          title: Metric
          type: string
        series:
          items:
            $ref: '#/components/schemas/TimeseriesSeriesResponse'
          title: Series
          type: array
      required:
      - metric
      title: MetricsTimeseriesResponse
      type: object
    NodeRole:
      description: 'Graph node role.


        Wire-level duplicate of :class:`trellis.schemas.enums.NodeRole`.'
      enum:
      - structural
      - semantic
      - curated
      title: NodeRole
      type: string
    PackFeedbackRequest:
      additionalProperties: false
      description: 'Request to record element-level feedback on a context pack.


        Mirrors the MCP ``record_feedback`` tool''s surface so the SDK,

        REST, and MCP feedback paths share one payload shape. Routes

        through :func:`trellis.feedback.recording.record_feedback`, which

        appends the durable ``pack_feedback.jsonl`` row and emits the

        authoritative ``FEEDBACK_RECORDED`` event.'
      properties:
        comment:
          anyOf:
          - type: string
          - type: 'null'
          title: Comment
        followed_advisory_ids:
          items:
            type: string
          title: Followed Advisory Ids
          type: array
        helpful_item_ids:
          items:
            type: string
          title: Helpful Item Ids
          type: array
        rating:
          anyOf:
          - type: number
          - type: 'null'
          title: Rating
        success:
          title: Success
          type: boolean
        target_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Id
        unhelpful_item_ids:
          items:
            type: string
          title: Unhelpful Item Ids
          type: array
      required:
      - success
      title: PackFeedbackRequest
      type: object
    PackFeedbackResponse:
      additionalProperties: false
      description: 'Result of recording pack feedback.


        ``event_log_in_sync`` surfaces the

        :attr:`trellis.feedback.recording.FeedbackRecordResult.event_log_in_sync`

        semantics: ``True`` when the authoritative ``FEEDBACK_RECORDED``

        event reached the EventLog (emitted now, or already present from a

        prior call). ``False`` means only the durable JSONL row was written

        and a reconcile is owed — callers must not treat the signal as

        having driven behavior yet.'
      properties:
        event_log_emitted:
          title: Event Log Emitted
          type: boolean
        event_log_in_sync:
          title: Event Log In Sync
          type: boolean
        event_log_skipped_as_duplicate:
          title: Event Log Skipped As Duplicate
          type: boolean
        feedback:
          title: Feedback
          type: string
        feedback_id:
          title: Feedback Id
          type: string
        pack_id:
          title: Pack Id
          type: string
        status:
          default: ok
          title: Status
          type: string
      required:
      - pack_id
      - feedback_id
      - feedback
      - event_log_in_sync
      - event_log_emitted
      - event_log_skipped_as_duplicate
      title: PackFeedbackResponse
      type: object
    PackRequest:
      additionalProperties: false
      description: Request to assemble a context pack.
      properties:
        agent_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Agent Id
        domain:
          anyOf:
          - type: string
          - type: 'null'
          title: Domain
        intent:
          title: Intent
          type: string
        max_items:
          default: 50
          title: Max Items
          type: integer
        max_tokens:
          default: 8000
          title: Max Tokens
          type: integer
        tag_filters:
          anyOf:
          - additionalProperties:
              additionalProperties: true
              type: object
            type: object
          - type: 'null'
          title: Tag Filters
      required:
      - intent
      title: PackRequest
      type: object
    PackResponse:
      additionalProperties: false
      description: Response containing an assembled context pack.
      properties:
        advisories:
          items:
            additionalProperties: true
            type: object
          title: Advisories
          type: array
        agent_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Agent Id
        count:
          title: Count
          type: integer
        domain:
          anyOf:
          - type: string
          - type: 'null'
          title: Domain
        intent:
          title: Intent
          type: string
        items:
          items:
            additionalProperties: true
            type: object
          title: Items
          type: array
        pack_id:
          title: Pack Id
          type: string
        retrieval_report:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Retrieval Report
        status:
          default: ok
          title: Status
          type: string
      required:
      - pack_id
      - intent
      - count
      - items
      title: PackResponse
      type: object
    PolicyRule:
      additionalProperties: false
      description: A single rule within a policy.
      properties:
        action:
          default: allow
          enum:
          - allow
          - deny
          - require_approval
          - warn
          title: Action
          type: string
        condition:
          default: always
          title: Condition
          type: string
        operation:
          title: Operation
          type: string
        params:
          additionalProperties: true
          title: Params
          type: object
        schema_version:
          default: 0.1.0
          title: Schema Version
          type: string
      required:
      - operation
      title: PolicyRule
      type: object
    PolicyScope:
      additionalProperties: false
      description: Scope at which a policy applies.
      properties:
        level:
          enum:
          - global
          - domain
          - team
          - entity_type
          title: Level
          type: string
        schema_version:
          default: 0.1.0
          title: Schema Version
          type: string
        value:
          anyOf:
          - type: string
          - type: 'null'
          title: Value
      required:
      - level
      title: PolicyScope
      type: object
    PolicyType:
      enum:
      - mutation
      - access
      - retention
      - redaction
      title: PolicyType
      type: string
    PromoteRequest:
      additionalProperties: false
      description: Request to promote a trace to a precedent.
      properties:
        description:
          title: Description
          type: string
        requested_by:
          default: api:promote
          title: Requested By
          type: string
        title:
          title: Title
          type: string
        trace_id:
          title: Trace Id
          type: string
      required:
      - trace_id
      - title
      - description
      title: PromoteRequest
      type: object
    ProposalDecisionResponse:
      additionalProperties: false
      description: Outcome of an approve / reject action on a proposal.
      properties:
        effect_size:
          anyOf:
          - type: number
          - type: 'null'
          title: Effect Size
        params_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Params Version
        proposal_id:
          title: Proposal Id
          type: string
        reason:
          title: Reason
          type: string
        status:
          title: Status
          type: string
      required:
      - proposal_id
      - status
      - reason
      title: ProposalDecisionResponse
      type: object
    ProposalPreviewResponse:
      additionalProperties: false
      description: Dry-run forecast for a single proposal promotion.
      properties:
        baseline_values:
          additionalProperties: true
          title: Baseline Values
          type: object
        effect_size:
          anyOf:
          - type: number
          - type: 'null'
          title: Effect Size
        predicted_status:
          title: Predicted Status
          type: string
        proposal_id:
          title: Proposal Id
          type: string
        proposed_values:
          additionalProperties: true
          title: Proposed Values
          type: object
        reason:
          title: Reason
          type: string
        sample_size:
          default: 0
          title: Sample Size
          type: integer
      required:
      - proposal_id
      - predicted_status
      - reason
      title: ProposalPreviewResponse
      type: object
    ProposalRejectRequest:
      additionalProperties: false
      description: Body for ``POST /api/v1/proposals/{id}/reject`` — optional rationale.
      properties:
        reason:
          default: rejected_by_reviewer
          title: Reason
          type: string
      title: ProposalRejectRequest
      type: object
    SchemaEvolutionCandidate:
      additionalProperties: false
      description: One WELL_KNOWN_CANDIDATE event as surfaced in the Review queue.
      properties:
        candidate_id:
          title: Candidate Id
          type: string
        candidate_kind:
          anyOf:
          - type: string
          - type: 'null'
          title: Candidate Kind
        count:
          default: 0
          title: Count
          type: integer
        distinct_domains:
          items:
            type: string
          title: Distinct Domains
          type: array
        distinct_extractors:
          items:
            type: string
          title: Distinct Extractors
          type: array
        first_seen:
          anyOf:
          - type: string
          - type: 'null'
          title: First Seen
        last_seen:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Seen
        open_string_value:
          anyOf:
          - type: string
          - type: 'null'
          title: Open String Value
        recorded_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Recorded At
        suggested_canonical_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Suggested Canonical Name
      required:
      - candidate_id
      title: SchemaEvolutionCandidate
      type: object
    SchemaEvolutionListResponse:
      additionalProperties: false
      description: List of schema-evolution candidates.
      properties:
        candidates:
          items:
            $ref: '#/components/schemas/SchemaEvolutionCandidate'
          title: Candidates
          type: array
        count:
          default: 0
          title: Count
          type: integer
      title: SchemaEvolutionListResponse
      type: object
    StatsResponse:
      additionalProperties: false
      description: Store statistics response.
      properties:
        documents:
          default: 0
          title: Documents
          type: integer
        edges:
          default: 0
          title: Edges
          type: integer
        events:
          default: 0
          title: Events
          type: integer
        nodes:
          default: 0
          title: Nodes
          type: integer
        status:
          default: ok
          title: Status
          type: string
        traces:
          default: 0
          title: Traces
          type: integer
      title: StatsResponse
      type: object
    TimeseriesPointResponse:
      additionalProperties: false
      description: 'One bucket''s value for one series.


        ``bucket_start`` is a UTC calendar-day key (``"YYYY-MM-DD"``).

        ``value`` is the metric value for that bucket; ``sample_count`` is

        the number of underlying observations (packs, items, or events —

        metric-dependent) so clients can dim low-confidence points.


        Buckets with no contributing events are **omitted** from a series

        rather than zero-filled — clients infer gaps from the missing

        ``bucket_start`` keys (an absent day means "no signal", not "zero").'
      properties:
        bucket_start:
          title: Bucket Start
          type: string
        sample_count:
          default: 0
          title: Sample Count
          type: integer
        value:
          title: Value
          type: number
      required:
      - bucket_start
      - value
      title: TimeseriesPointResponse
      type: object
    TimeseriesSeriesResponse:
      additionalProperties: false
      description: 'One group''s ordered list of buckets.


        ``group_key`` is the resolved grouping value: a domain, an

        intent_family, ``"all"`` when ungrouped, or — for

        ``parameter_promotions`` — the governance event type. Points are

        sorted by ``bucket_start`` ascending and omit empty buckets (see

        :class:`TimeseriesPointResponse`).'
      properties:
        group_key:
          title: Group Key
          type: string
        points:
          items:
            $ref: '#/components/schemas/TimeseriesPointResponse'
          title: Points
          type: array
      required:
      - group_key
      title: TimeseriesSeriesResponse
      type: object
    TunerProposalListResponse:
      additionalProperties: false
      description: List of pending tuner proposals.
      properties:
        count:
          default: 0
          title: Count
          type: integer
        proposals:
          items:
            $ref: '#/components/schemas/TunerProposalSummary'
          title: Proposals
          type: array
      title: TunerProposalListResponse
      type: object
    TunerProposalSummary:
      additionalProperties: false
      description: One pending tuner proposal as surfaced in the Review queue.
      properties:
        baseline_values:
          additionalProperties: true
          title: Baseline Values
          type: object
        component_id:
          title: Component Id
          type: string
        domain:
          anyOf:
          - type: string
          - type: 'null'
          title: Domain
        effect_size:
          anyOf:
          - type: number
          - type: 'null'
          title: Effect Size
        intent_family:
          anyOf:
          - type: string
          - type: 'null'
          title: Intent Family
        proposal_id:
          title: Proposal Id
          type: string
        proposed_values:
          additionalProperties: true
          title: Proposed Values
          type: object
        sample_size:
          default: 0
          title: Sample Size
          type: integer
        status:
          title: Status
          type: string
        tool_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Tool Name
        tuner:
          title: Tuner
          type: string
      required:
      - proposal_id
      - tuner
      - status
      - component_id
      title: TunerProposalSummary
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
    VersionResponse:
      additionalProperties: false
      description: 'Response body for ``GET /api/version``.


        Used by SDK clients on first call to enforce compatibility:


        * Reject when ``api_major`` differs from the client''s expected major.

        * Warn when ``api_minor`` is older than the client''s expected minor.

        * Reject when the client''s own version is below ``sdk_min``.


        ``package_version`` is informational only — it''s the actual

        installed ``trellis-ai`` package version, which may move without

        changing the API contract.'
      properties:
        api_major:
          title: Api Major
          type: integer
        api_minor:
          title: Api Minor
          type: integer
        api_version:
          title: Api Version
          type: string
        mcp_tools_version:
          default: 1
          title: Mcp Tools Version
          type: integer
        package_version:
          title: Package Version
          type: string
        sdk_min:
          title: Sdk Min
          type: string
        wire_schema:
          title: Wire Schema
          type: string
      required:
      - api_major
      - api_minor
      - api_version
      - wire_schema
      - sdk_min
      - package_version
      title: VersionResponse
      type: object
  securitySchemes:
    APIKeyHeader:
      in: header
      name: Authorization
      type: apiKey
info:
  description: Structured memory and learning for AI agents
  title: Trellis API
  version: 0.2.0
openapi: 3.1.0
paths:
  /api/v1/advisories:
    get:
      description: List stored advisories.
      operationId: list_advisories_api_v1_advisories_get
      parameters:
      - description: Filter by scope
        in: query
        name: scope
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by scope
          title: Scope
      - description: Minimum confidence
        in: query
        name: min_confidence
        required: false
        schema:
          default: 0.0
          description: Minimum confidence
          title: Min Confidence
          type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response List Advisories Api V1 Advisories Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: List Advisories
      tags:
      - admin
  /api/v1/advisories/generate:
    post:
      description: 'Generate advisories from outcome data.


        Analyzes PACK_ASSEMBLED and FEEDBACK_RECORDED events to find patterns,

        then stores deterministic advisories for delivery alongside packs.'
      operationId: generate_advisories_api_v1_advisories_generate_post
      parameters:
      - description: Days of history to analyze
        in: query
        name: days
        required: false
        schema:
          default: 30
          description: Days of history to analyze
          title: Days
          type: integer
      - description: Min sample size
        in: query
        name: min_sample
        required: false
        schema:
          default: 5
          description: Min sample size
          title: Min Sample
          type: integer
      - description: Min effect size
        in: query
        name: min_effect
        required: false
        schema:
          default: 0.15
          description: Min effect size
          title: Min Effect
          type: number
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Generate Advisories Api V1 Advisories Generate Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Generate Advisories
      tags:
      - admin
  /api/v1/code-proposals:
    get:
      description: 'List recent ``PROPOSAL_DRAFTED`` events with their markdown preview.


        Read-only surface — the Review view shows these for visibility but

        exposes no action. Mirrors the read in ``trellis admin

        list-proposals`` / ``show-proposal``.'
      operationId: list_code_proposals_api_v1_code_proposals_get
      parameters:
      - description: Max PROPOSAL_DRAFTED events to return
        in: query
        name: limit
        required: false
        schema:
          default: 50
          description: Max PROPOSAL_DRAFTED events to return
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeProposalListResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: List Code Proposals
      tags:
      - admin
  /api/v1/commands/batch:
    post:
      description: 'Execute a batch of mutation commands through the governed pipeline.


        Supported strategies:


        - ``sequential`` — execute all, never stop early.

        - ``stop_on_error`` — halt on the first ``FAILED`` or ``REJECTED``.

        - ``continue_on_error`` — execute all, include errors in results.'
      operationId: execute_batch_api_v1_commands_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchCommandRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchCommandResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Execute Batch
      tags:
      - mutations
  /api/v1/documents:
    post:
      description: 'Write a document to the document store for FTS retrieval.


        Accepts: ``{"doc_id": "...", "content": "...", "metadata": {...}}``'
      operationId: create_document_api_v1_documents_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              title: Body
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Create Document Api V1 Documents Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Create Document
      tags:
      - curate
  /api/v1/effectiveness:
    get:
      description: Analyze context pack effectiveness.
      operationId: effectiveness_api_v1_effectiveness_get
      parameters:
      - description: Days of history to analyze
        in: query
        name: days
        required: false
        schema:
          default: 30
          description: Days of history to analyze
          title: Days
          type: integer
      - description: Minimum item appearances
        in: query
        name: min_appearances
        required: false
        schema:
          default: 2
          description: Minimum item appearances
          title: Min Appearances
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Effectiveness Api V1 Effectiveness Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Effectiveness
      tags:
      - admin
  /api/v1/effectiveness/apply-noise-tags:
    post:
      description: 'Analyze effectiveness AND apply noise tags to low-value items.


        Runs the full feedback loop: analyze → tag noise items with

        signal_quality="noise" so PackBuilder excludes them by default.'
      operationId: apply_noise_tags_api_v1_effectiveness_apply_noise_tags_post
      parameters:
      - description: Days of history to analyze
        in: query
        name: days
        required: false
        schema:
          default: 30
          description: Days of history to analyze
          title: Days
          type: integer
      - description: Minimum item appearances
        in: query
        name: min_appearances
        required: false
        schema:
          default: 2
          description: Minimum item appearances
          title: Min Appearances
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Apply Noise Tags Api V1 Effectiveness Apply Noise Tags Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Apply Noise Tags
      tags:
      - admin
  /api/v1/entities:
    post:
      description: Create an entity node in the knowledge graph.
      operationId: create_entity_api_v1_entities_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityCreateRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Create Entity Api V1 Entities Post
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Create Entity
      tags:
      - curate
  /api/v1/entities/{entity_id}:
    get:
      description: Get an entity and its neighborhood.
      operationId: get_entity_api_v1_entities__entity_id__get
      parameters:
      - in: path
        name: entity_id
        required: true
        schema:
          title: Entity Id
          type: string
      - description: Subgraph traversal depth
        in: query
        name: depth
        required: false
        schema:
          default: 1
          description: Subgraph traversal depth
          title: Depth
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response Get Entity Api V1 Entities  Entity Id  Get
                type: object
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Get Entity
      tags:
      - retrieve
  /api/v1/evidence:
    post:
      description: Ingest evidence.
      operationId: ingest_evidence_api_v1_evidence_post
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: true
              title: Body
              type: object
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Ingest Evidence
      tags:
      - ingest
  /api/v1/extract/drafts:
    post:
      description: 'Submit a client-extracted draft batch for governed ingestion.


        The ``Idempotency-Key`` header overrides

        ``req.batch.idempotency_key`` when both are set — the header is

        closer to the transport layer and more visible on the client

        side, so it wins.  When neither is present the submission is

        still processed, but without deduplication.'
      operationId: submit_drafts_api_v1_extract_drafts_post
      parameters:
      - in: header
        name: Idempotency-Key
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency-Key
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DraftSubmissionRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftSubmissionResult'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Submit Drafts
      tags:
      - extract
  /api/v1/feedback:
    post:
      description: Record feedback on a trace or precedent.
      operationId: record_feedback_api_v1_feedback_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Record Feedback
      tags:
      - curate
  /api/v1/graph/search:
    get:
      description: Search graph nodes by name or type.
      operationId: search_entities_api_v1_graph_search_get
      parameters:
      - description: Name substring search (case-insensitive)
        in: query
        name: q
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Name substring search (case-insensitive)
          title: Q
      - description: Filter by node type
        in: query
        name: node_type
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by node type
          title: Node Type
      - description: 'Sort field: created_at, name, node_type'
        in: query
        name: sort
        required: false
        schema:
          default: created_at
          description: 'Sort field: created_at, name, node_type'
